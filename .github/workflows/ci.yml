name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"  # Weekly Monday

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Verify imports
        run: |
          python -c "import sys; sys.path.insert(0,'src'); from helpers.fingerprint import fingerprint_randomizer; print('OK')"
      - name: Check syntax
        run: |
          python -m py_compile src/helpers/fingerprint.py
          python -m py_compile src/helpers/utils.py